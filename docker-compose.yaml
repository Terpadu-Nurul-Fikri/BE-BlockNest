services:
  be-backend:
    image: be-blocknest:latest
    container_name: be-blocknest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "--input-type=module",
          "-e",
          "const response = await fetch('http://127.0.0.1:3000/health'); process.exit(response.ok ? 0 : 1);",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
networks:
  app-network:
    driver: bridge
