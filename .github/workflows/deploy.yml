name: Deploy backend to VPS

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    build-and-scan:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Docker buildx
              uses: docker/setup-buildx-action@v2

            - name: Build Docker image
              run: |
                  docker build -t be-blocknest:${{ github.sha }} .
                  docker tag be-blocknest:${{ github.sha }} be-blocknest:latest

            - name: Scan Docker image for vulnerabilities
              uses: aquasecurity/trivy-action@0.30.0
              with:
                  image-ref: be-blocknest:${{ github.sha }}
                  format: "table"
                  output: "trivy-report.txt"
                  exit-code: "1"
                  severity: "CRITICAL,HIGH"

            - name: Upload Scan Report
              uses: actions/upload-artifact@v4
              if: always() # Tetap upload meskipun scan gagal
              with:
                  name: trivy-report
                  path: trivy-report.txt
                  retention-days: 7

            - name: Save Docker Image
              if: success() # Hanya simpan jika build dan scan berhasil
              run: docker save be-blocknest:latest | gzip > be-blocknest_latest.tar.gz

            - name: Upload Docker Image
              if: success() # Hanya upload jika build dan scan berhasil
              uses: actions/upload-artifact@v4
              with:
                  name: be-blocknest-image
                  path: be-blocknest_latest.tar.gz
                  retention-days: 1

    deploy-to-vps:
        runs-on: ubuntu-latest
        needs: build-and-scan
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && success()
        permissions: {}

        steps:
            - name: Download Docker Image
              uses: actions/download-artifact@v4
              with:
                  name: be-blocknest-image

            - name: Copy files to VPS
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USERNAME }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: ${{ secrets.VPS_PORT || 7878 }}
                  source: "be-blocknest_latest.tar.gz,docker-compose.yml"
                  target: "/home/${{ secrets.VPS_USERNAME }}/be-blocknest"

            - name: Deploy with Docker Compose
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USERNAME }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: ${{ secrets.VPS_PORT || 7878 }}
                  script: |
                      cd /home/${{ secrets.VPS_USERNAME }}/be-blocknest
                      docker load < be-blocknest_latest.tar.gz

                      # Atomic deployment dengan docker-compose
                      docker-compose up -d --remove-orphans

                      # Cleanup: Hapus image 'dangling' (image lama yang tidak terpakai)
                      docker image prune -f
                      rm -f be-blocknest_latest.tar.gz
